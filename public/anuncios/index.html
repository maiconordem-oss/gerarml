<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelo de Anúncios — Mercado Livre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<style>/* ======= Sistema de design - Anúncios ML ======= */
:root {
  --green: #1F7A3A;
  --green-dark: #155427;
  --green-light: #E8F3EC;
  --yellow: #FFC42B;
  --yellow-soft: #FFE9A8;
  --orange: #E89522;
  --bg: #F4F4F4;
  --card: #FFFFFF;
  --ink: #1A1A1A;
  --ink-soft: #4A4A4A;
  --line: #E6E6E6;
  --shadow: 0 8px 24px rgba(20,20,20,.08);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: #ECECEC;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ======= App shell ======= */
.app {
  min-height: 100vh;
  padding: 32px 24px 96px;
}

.header {
  max-width: 1280px;
  margin: 0 auto 28px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 24px;
  flex-wrap: wrap;
}

.header h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: 22px;
  font-weight: 800;
  margin: 0 0 4px;
  letter-spacing: -0.01em;
}
.header p {
  margin: 0;
  font-size: 13px;
  color: var(--ink-soft);
}

.header-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: white;
  color: var(--ink);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all .15s ease;
}
.btn:hover { border-color: var(--ink); }
.btn.primary {
  background: var(--green);
  color: white;
  border-color: var(--green);
}
.btn.primary:hover { background: var(--green-dark); border-color: var(--green-dark); }

/* ======= Grid de fotos ======= */
.grid {
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 32px;
  align-items: start;
}

.slot {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.slot-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px;
}
.slot-num {
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.slot-num b { color: var(--green); }
.slot-actions { display: flex; gap: 4px; }
.slot-actions button {
  font-size: 11px;
  font-weight: 600;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--line);
  background: white;
  cursor: pointer;
  color: var(--ink-soft);
}
.slot-actions button:hover { color: var(--ink); border-color: var(--ink); }

/* The "card" is the canvas — fixed 1000×1000 logical, scales to fit */
.canvas-wrap {
  width: 100%;
  aspect-ratio: 1200 / 1540;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  position: relative;
}
.canvas {
  width: 1200px;
  height: 1540px;
  transform-origin: top left;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

/* ======= Reusable canvas type & components ======= */
.tpl {
  width: 100%;
  height: 100%;
  padding: 70px 80px;
  display: flex;
  flex-direction: column;
  position: relative;
  background: var(--bg);
}

.tpl h1 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 56px;
  line-height: 1.05;
  letter-spacing: -0.015em;
  text-align: center;
  margin: 0;
  color: var(--ink);
}
.tpl h1 .green { color: var(--green); }
.tpl h1 .pill {
  background: var(--yellow);
  padding: 4px 22px;
  border-radius: 12px;
  display: inline-block;
}
.tpl h1 .pill-yellow-inline {
  background: var(--yellow);
  padding: 2px 14px;
  border-radius: 8px;
  display: inline-block;
  line-height: 1;
}

/* ======= Upload zone (auto-generate) ======= */
.uploader {
  max-width: 920px;
  margin: 0 auto 36px;
  background: white;
  border-radius: 16px;
  padding: 28px;
  box-shadow: var(--shadow);
}
.uploader h2 {
  font-family: 'Montserrat', sans-serif;
  font-size: 20px;
  font-weight: 800;
  margin: 0 0 4px;
}
.uploader p {
  margin: 0 0 18px;
  font-size: 13px;
  color: var(--ink-soft);
}
.drop {
  border: 2px dashed #cfcfcf;
  border-radius: 12px;
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
}
.drop:hover, .drop.dragover {
  border-color: var(--green);
  background: var(--green-light);
}
.drop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  margin-top: 16px;
}
.drop-thumb {
  aspect-ratio: 1;
  background: #f5f5f5;
  border-radius: 8px;
  background-size: cover;
  background-position: center;
  position: relative;
  border: 1px solid var(--line);
}
.drop-thumb-rm {
  position: absolute;
  top: 4px; right: 4px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(0,0,0,.6);
  color: white;
  border: 0;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
}

/* Inline highlights inside body text */
.hl-yellow {
  background: var(--yellow);
  padding: 2px 10px;
  border-radius: 6px;
  font-weight: 700;
}
.hl-green { color: var(--green); font-weight: 700; }

/* Bottom callout band */
.callout {
  margin-top: auto;
  background: var(--green);
  color: white;
  border-radius: 14px;
  padding: 22px 26px;
  display: flex;
  align-items: center;
  gap: 18px;
}
.callout .ic {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,.18);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  font-size: 22px;
  font-weight: 800;
}
.callout .txt { line-height: 1.25; }
.callout .txt b {
  font-family: 'Montserrat', sans-serif;
  font-size: 22px;
  font-weight: 800;
  display: block;
}
.callout .txt span {
  font-size: 16px;
  opacity: .92;
}

/* Feature card with icon */
.feat {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-width: 280px;
}
.feat .feat-head {
  display: flex;
  align-items: center;
  gap: 10px;
}
.ic-square {
  background: var(--yellow);
  display: grid;
  place-items: center;
  flex-shrink: 0;
}
.ic-square svg {
  color: #fff !important;
  stroke: #fff !important;
}
.feat .ic-square {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: var(--yellow);
  display: grid;
  place-items: center;
  flex-shrink: 0;
}
.feat .ic-square svg { width: 28px; height: 28px; color: #fff; stroke: #fff; }
.feat h3 {
  font-family: 'Montserrat', sans-serif;
  font-size: 22px;
  font-weight: 800;
  margin: 0;
  color: var(--green);
}
.feat p {
  margin: 0;
  font-size: 17px;
  line-height: 1.3;
  color: var(--ink);
}

/* Arrows for feature callouts */
.arrow {
  position: absolute;
  pointer-events: none;
}

/* Empty image placeholder */
.img-placeholder {
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  background: repeating-linear-gradient(
    -45deg,
    #EFEFEF 0 12px,
    #E6E6E6 12px 24px
  );
  color: #888;
  font-family: ui-monospace, monospace;
  font-size: 14px;
  border-radius: 8px;
}

/* ======= Tweaks panel additions ======= */
.tw-tabs {
  display: flex;
  gap: 4px;
  background: #F0F0F0;
  padding: 4px;
  border-radius: 8px;
  margin-bottom: 12px;
}
.tw-tab {
  flex: 1;
  font-size: 11px;
  font-weight: 600;
  padding: 8px 4px;
  border: 0;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  color: var(--ink-soft);
}
.tw-tab.active {
  background: white;
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(0,0,0,.06);
}
/* Modo export — esconde todos artefatos de edição */
.exporting, .exporting * {
  outline: none !important;
  outline-offset: 0 !important;
  caret-color: transparent !important;
  cursor: default !important;
}
.exporting [data-export-hide] {
  display: none !important;
}
</style>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
